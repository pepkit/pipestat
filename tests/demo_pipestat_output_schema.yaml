pipeline_name: PEPPRO
samples:
  smooth_bw:
    type: string
    description: "A smooth bigwig file"
  aligned_bam:
    type: string
    description: "A sorted, aligned BAM file"
  peaks_bed:
    type: string
    description: "Peaks in BED format"
  number_of_things:
    type: integer
    description: "Number of things, min 20, multiple of 10"
    multipleOf: 10
    minimum: 20
  name_of_something:
    type: string
    description: "Name of something, min len 2 characters"
    minLength: 2
  output_file:
    type: file
    description: "A file produced by the pipeline"
  output_image:
    type: image
    description: "An image produced by the pipeline"
project:
  tss_file:
    type: image
    description: "Plots TSS scores for each sample."
  counts_table:
    type: string
    description: "Project peak coverages: chr_start_end X sample"
